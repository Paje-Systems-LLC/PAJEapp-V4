<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAJE SYSTEMS | Layout & Colors Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paje: {
                            blue: '#0056b3',
                            dark: '#004494',
                            light: '#f0f2f5',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white antialiased">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-4">
                    <!-- Logo Box -->
                    <div class="w-8 h-8 bg-paje-blue rounded-lg"></div>
                    <!-- Brand Name -->
                    <div class="h-6 w-32 bg-gray-900 rounded-md"></div>
                </div>
                <!-- Nav Links -->
                <div class="hidden md:flex space-x-8">
                    <div class="h-4 w-16 bg-gray-300 rounded-md"></div>
                    <div class="h-4 w-16 bg-gray-300 rounded-md"></div>
                    <div class="h-4 w-16 bg-gray-300 rounded-md"></div>
                </div>
                <!-- Auth Buttons -->
                <div class="flex items-center gap-6">
                    <div class="h-4 w-10 bg-gray-300 rounded-md"></div>
                    <div class="bg-paje-blue px-5 py-2.5 rounded-full shadow-lg shadow-blue-500/30 flex items-center justify-center">
                        <div class="h-4 w-24 bg-white/50 rounded-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative">
            <div class="lg:grid lg:grid-cols-12 lg:gap-16 items-center">
                <div class="lg:col-span-6 flex flex-col items-center lg:items-start text-center lg:text-left">
                    <!-- Badge -->
                    <div class="px-5 py-2.5 mb-6 bg-blue-50 rounded-full inline-block">
                        <div class="h-3 w-40 bg-paje-blue/50 rounded-sm"></div>
                    </div>
                    <!-- H1 -->
                    <div class="w-full flex justify-center lg:justify-start mb-3">
                        <div class="h-10 lg:h-14 w-4/5 bg-gray-900 rounded-xl"></div>
                    </div>
                    <div class="w-full flex justify-center lg:justify-start mb-8">
                        <div class="h-10 lg:h-14 w-3/5 bg-gradient-to-r from-paje-blue to-blue-400 rounded-xl"></div>
                    </div>
                    <!-- P -->
                    <div class="h-4 w-full bg-gray-300 rounded-md mb-3"></div>
                    <div class="h-4 w-5/6 bg-gray-300 rounded-md mb-10"></div>
                    <!-- CTA Buttons -->
                    <div class="flex flex-col sm:flex-row gap-4 w-full justify-center lg:justify-start">
                        <div class="bg-gray-900 px-6 py-4 rounded-xl flex items-center gap-3 w-40 justify-center">
                            <div class="w-6 h-6 bg-white/30 rounded-full"></div>
                            <div class="flex flex-col gap-1.5">
                                <div class="h-2 w-8 bg-white/20 rounded-sm"></div>
                                <div class="h-3 w-16 bg-white/40 rounded-sm"></div>
                            </div>
                        </div>
                        <div class="bg-gray-900 px-6 py-4 rounded-xl flex items-center gap-3 w-44 justify-center">
                            <div class="w-6 h-6 bg-white/30 rounded-full"></div>
                            <div class="flex flex-col gap-1.5">
                                <div class="h-2 w-12 bg-white/20 rounded-sm"></div>
                                <div class="h-3 w-16 bg-white/40 rounded-sm"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- App Mockup / Visual -->
                <div class="lg:col-span-6 mt-12 lg:mt-0 relative">
                    <div class="relative mx-auto border-gray-800 bg-gray-800 border-[14px] rounded-[2.5rem] h-[600px] w-[300px] shadow-xl">
                        <div class="h-[32px] w-[3px] bg-gray-800 absolute -left-[17px] top-[72px] rounded-l-lg"></div>
                        <div class="h-[46px] w-[3px] bg-gray-800 absolute -left-[17px] top-[124px] rounded-l-lg"></div>
                        <div class="h-[46px] w-[3px] bg-gray-800 absolute -left-[17px] top-[178px] rounded-l-lg"></div>
                        <div class="h-[64px] w-[3px] bg-gray-800 absolute -right-[17px] top-[142px] rounded-r-lg"></div>
                        <div class="rounded-[2rem] overflow-hidden w-[272px] h-[572px] bg-white">
                            <!-- Conteúdo da Tela do App -->
                            <div class="bg-paje-blue h-full w-full flex flex-col items-center justify-center p-6">
                                <div class="w-16 h-16 bg-white/20 rounded-full mb-6"></div>
                                <div class="h-6 w-32 bg-white/40 rounded-md mb-4"></div>
                                <div class="h-3 w-48 bg-white/20 rounded-sm mb-2"></div>
                                <div class="h-3 w-40 bg-white/20 rounded-sm"></div>
                                
                                <div class="mt-10 w-full flex flex-col gap-4 w-full">
                                    <div class="bg-white/10 h-32 rounded-xl border border-white/20"></div>
                                    <div class="bg-white/10 h-14 rounded-xl border border-white/20"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Features Grid -->
    <section class="py-20 bg-gray-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid md:grid-cols-3 gap-8">
                <!-- Card HDsys -->
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-start">
                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mb-6">
                        <div class="w-6 h-6 bg-paje-blue/50 rounded-sm"></div>
                    </div>
                    <div class="h-6 w-24 bg-gray-900 rounded-md mb-4"></div>
                    <div class="h-3 w-full bg-gray-300 rounded-sm mb-2"></div>
                    <div class="h-3 w-full bg-gray-300 rounded-sm mb-2"></div>
                    <div class="h-3 w-3/4 bg-gray-300 rounded-sm"></div>
                </div>
                
                <!-- Card PAJEclub -->
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-start">
                    <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center mb-6">
                        <div class="w-6 h-6 bg-purple-600/50 rounded-sm"></div>
                    </div>
                    <div class="h-6 w-32 bg-gray-900 rounded-md mb-4"></div>
                    <div class="h-3 w-full bg-gray-300 rounded-sm mb-2"></div>
                    <div class="h-3 w-full bg-gray-300 rounded-sm mb-2"></div>
                    <div class="h-3 w-4/5 bg-gray-300 rounded-sm"></div>
                </div>
                
                <!-- Card BIOsys -->
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-start">
                    <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center mb-6">
                        <div class="w-6 h-6 bg-green-600/50 rounded-sm"></div>
                    </div>
                    <div class="h-6 w-28 bg-gray-900 rounded-md mb-4"></div>
                    <div class="h-3 w-full bg-gray-300 rounded-sm mb-2"></div>
                    <div class="h-3 w-5/6 bg-gray-300 rounded-sm mb-2"></div>
                    <div class="h-3 w-2/3 bg-gray-300 rounded-sm"></div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
