<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAJE SYSTEMS - Acesso Único</title>
    <!-- Importando Supabase Client via CDN para o protótipo -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS Reset & Variables - Estilo Picasso Minimalista */
        :root {
            --primary-color: #0056b3; /* Azul Corporativo Paje */
            --primary-hover: #004494;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-secondary: #6b7280;
            --error-color: #dc2626;
            --success-color: #16a34a;
            --border-radius: 8px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 2rem;
        }
        
        .logo-placeholder {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: -0.025em;
        }
        .logo-image {
            max-width: 200px; /* Ajuste o tamanho conforme necessário */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        h2 { margin-bottom: 0.5rem; color: var(--text-color); font-size: 1.25rem; font-weight: 600; }
        p.subtitle { margin-bottom: 1.5rem; color: var(--text-secondary); font-size: 0.875rem; }

        .input-group { margin-bottom: 1rem; text-align: left; }
        
        label { display: block; margin-bottom: 0.375rem; font-size: 0.875rem; font-weight: 500; color: var(--text-color); }
        
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1); }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }

        .message { margin-top: 1rem; font-size: 0.875rem; min-height: 1.25rem; }
        .error { color: var(--error-color); }
        .success { color: var(--success-color); }

        .footer { margin-top: 2rem; font-size: 0.75rem; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <div class="logo-placeholder">PAJE SYSTEMS</div>
            <!-- ATENÇÃO: Certifique-se de que o arquivo 'logo.png' esteja na mesma pasta deste HTML -->
            <img src="logo.png" alt="Logo PAJE SYSTEMS" class="logo-image">
        </div>
        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Acesse sua conta unificada</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="nome@pajesystems.com" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" id="submitBtn">Entrar</button>
        </form>

        <div id="message" class="message"></div>

        <div class="footer">
            &copy; 2026 Paje Systems. Segurança e Governança.
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DO PICASSO PARA O SUPABASE ---
        // Nota: Em produção, estas chaves devem vir de variáveis de ambiente injetadas pelo servidor Node.js
        const SUPABASE_URL = 'https://api.pajesystems.com'; 
        const SUPABASE_ANON_KEY = 'SUA_CHAVE_PUBLICA_ANONIMA_AQUI'; // Substituir pela chave real do projeto

        // Inicialização do Cliente
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Elementos do DOM
        const loginForm = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        // Manipulador de Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            setLoading(true);
            setMessage('');

            try {
                // Autenticação via Supabase Auth (GoTrue)
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                setMessage('Login realizado com sucesso! Redirecionando...', 'success');
                
                // Lógica de Redirecionamento SSO
                // O sistema verifica se veio de outro app (ex: HDsys) via query param
                const urlParams = new URLSearchParams(window.location.search);
                const redirectTo = urlParams.get('redirect_to') || '/dashboard'; 

                // Pequeno delay para o usuário ver o sucesso
                setTimeout(() => {
                    // Aqui o token seria passado de forma segura ou o cookie de sessão estabelecido
                    window.location.href = redirectTo;
                }, 800);

            } catch (error) {
                console.error('Erro de login:', error);
                setMessage('Falha na autenticação. Verifique suas credenciais.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // Funções Auxiliares de UI
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.textContent = isLoading ? 'Autenticando...' : 'Entrar';
        }

        function setMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + (type || '');
        }
    </script>
</body>
</html>
